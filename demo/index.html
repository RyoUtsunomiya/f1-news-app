<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>F1 ニュースアプリ デモ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --f1red: #E10600;
      --dark-bg: #0F0F0F;
      --card-bg: #1C1C1C;
      --surface: #2A2A2A;
      --border: #2E2E2E;
      --text: #FFFFFF;
      --text-sub: #AAAAAA;
      --text-dim: #707070;
    }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, 'Noto Sans JP', 'Hiragino Sans', sans-serif;
    }

    /* Phone frame */
    .phone-frame {
      width: 390px;
      height: 844px;
      background: var(--dark-bg);
      border-radius: 44px;
      box-shadow: 0 0 0 10px #1a1a1a, 0 0 0 12px #333, 0 50px 100px rgba(0,0,0,0.6);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 44px;
      background: var(--dark-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .status-time { font-size: 15px; font-weight: 600; color: var(--text); }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { fill: var(--text); }

    /* App bar */
    .app-bar { background: var(--dark-bg); padding: 0 16px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .app-bar-title { display: flex; align-items: center; gap: 10px; height: 52px; }
    .title-accent { width: 4px; height: 22px; background: var(--f1red); border-radius: 2px; }
    .title-text { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: 0.5px; }
    .title-actions { margin-left: auto; display: flex; gap: 2px; }
    .icon-btn {
      background: none; border: none; color: var(--text-sub);
      font-size: 20px; cursor: pointer; padding: 6px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .icon-btn:hover { background: var(--surface); }
    .icon-btn svg { width: 20px; height: 20px; fill: #aaa; }
    .badge-dot {
      position: absolute; top: 6px; right: 6px;
      width: 8px; height: 8px; background: var(--f1red);
      border-radius: 50%;
    }

    /* Tabs */
    .tab-bar { display: flex; background: var(--dark-bg); flex-shrink: 0; }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 0 10px; cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; color: var(--text-dim); font-size: 12px; font-weight: 500;
    }
    .tab.active { color: var(--f1red); border-bottom-color: var(--f1red); }
    .tab svg { width: 20px; height: 20px; fill: currentColor; }

    /* Content */
    .content { flex: 1; overflow: hidden; position: relative; }
    .tab-content { display: none; height: 100%; overflow-y: auto; scrollbar-width: none; }
    .tab-content::-webkit-scrollbar { display: none; }
    .tab-content.active { display: block; }

    /* Screen overlay (ソース管理) */
    .screen-overlay {
      position: absolute; inset: 0; background: var(--dark-bg);
      transform: translateX(100%); transition: transform 0.3s ease;
      z-index: 10; display: flex; flex-direction: column;
    }
    .screen-overlay.open { transform: translateX(0); }
    .screen-appbar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--dark-bg); flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none; color: var(--text);
      cursor: pointer; padding: 4px; border-radius: 6px;
    }
    .back-btn:hover { background: var(--surface); }
    .back-btn svg { width: 22px; height: 22px; fill: var(--text); display: block; }
    .screen-title { font-size: 17px; font-weight: 700; }
    .screen-body { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 16px; }
    .screen-body::-webkit-scrollbar { display: none; }

    /* Filter bar */
    .filter-bar { display: flex; gap: 8px; padding: 10px 12px 8px; overflow-x: auto; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; padding: 6px 14px; border-radius: 20px; font-size: 12px;
      cursor: pointer; border: 1px solid #3A3A3A; background: var(--surface); color: var(--text-sub);
      transition: all 0.18s; flex-shrink: 0;
    }
    .chip.active { background: var(--f1red); border-color: var(--f1red); color: #fff; font-weight: 700; }

    /* Ad */
    .ad-banner {
      margin: 6px 12px; height: 52px; background: var(--surface);
      border-radius: 8px; border: 1px dashed #3A3A3A;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      color: var(--text-dim); font-size: 11px;
    }
    .ad-banner-medium { height: 100px; margin: 10px 12px; }
    .ad-label { font-size: 9px; color: var(--text-dim); border: 1px solid var(--text-dim); padding: 1px 4px; border-radius: 2px; }

    /* Article card */
    .article-card {
      margin: 5px 12px; background: var(--card-bg); border-radius: 12px;
      border: 1px solid var(--border); overflow: hidden; cursor: pointer;
      transition: transform 0.1s;
    }
    .article-card:active { transform: scale(0.98); }
    .article-card-inner { display: flex; gap: 12px; padding: 12px; }
    .article-thumb {
      width: 88px; height: 68px; border-radius: 8px; flex-shrink: 0;
      background: var(--surface); display: flex; align-items: center;
      justify-content: center; font-size: 24px;
    }
    .article-info { flex: 1; min-width: 0; }
    .source-badge {
      display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px;
      font-weight: 700; color: var(--f1red); background: rgba(225,6,0,0.12);
      border: 1px solid rgba(225,6,0,0.3); margin-bottom: 6px;
    }
    .source-badge.custom-badge { color: #7CB9FF; background: rgba(124,185,255,0.12); border-color: rgba(124,185,255,0.3); }
    .article-title {
      font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .article-meta { display: flex; align-items: center; gap: 3px; margin-top: 8px; color: var(--text-dim); font-size: 11px; }

    /* AI summary */
    .ai-header { padding: 16px 16px 8px; }
    .ai-badge {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
      background: rgba(225,6,0,0.1); border-radius: 4px; font-size: 10px;
      font-weight: 700; color: var(--f1red); margin-bottom: 8px;
    }
    .ai-title-main { font-size: 22px; font-weight: 800; line-height: 1.2; }
    .ai-subtitle { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
    .summary-card { margin: 7px 12px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); padding: 16px; }
    .topic-badge {
      display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px;
      border-radius: 20px; background: linear-gradient(90deg, #E10600, #FF3333);
      font-size: 11px; font-weight: 700; color: #fff; margin-bottom: 10px;
    }
    .summary-title { font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 10px; }
    .summary-body { font-size: 14px; line-height: 1.7; color: #B0B0B0; }
    .summary-body.collapsed { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .expand-btn { display: flex; align-items: center; gap: 2px; color: var(--f1red); font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 8px; background: none; border: none; padding: 4px 0; }
    .summary-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0 10px; }
    .summary-footer { display: flex; align-items: center; gap: 4px; color: var(--text-dim); font-size: 11px; }

    /* Source Manager */
    .section-header {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: var(--f1red);
      letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .section-header svg { width: 15px; height: 15px; fill: var(--f1red); }
    .source-tile {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; background: var(--surface); border-radius: 10px;
      margin-bottom: 6px;
    }
    .source-tile svg { width: 16px; height: 16px; fill: #aaa; flex-shrink: 0; }
    .source-tile.custom-tile { border: 1px solid rgba(225,6,0,0.2); }
    .source-tile.custom-tile svg { fill: var(--f1red); }
    .source-tile-name { flex: 1; font-size: 14px; font-weight: 600; }
    .source-tile-url { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .default-chip {
      font-size: 10px; color: var(--text-dim); padding: 2px 7px;
      background: rgba(255,255,255,0.07); border-radius: 4px; flex-shrink: 0;
    }
    .delete-btn {
      background: none; border: none; color: #666; cursor: pointer;
      padding: 4px; border-radius: 6px; display: flex; align-items: center;
    }
    .delete-btn:hover { color: var(--f1red); }
    .delete-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .form-section { margin-top: 24px; }
    .form-label { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .form-hint { font-size: 11px; color: var(--text-dim); margin-bottom: 14px; }
    .input-wrap { position: relative; margin-bottom: 10px; }
    .text-input {
      width: 100%; padding: 12px 44px 12px 14px; background: var(--surface);
      border: none; border-radius: 10px; color: var(--text); font-size: 14px;
      outline: none; font-family: inherit;
    }
    .text-input::placeholder { color: var(--text-dim); }
    .input-icon-btn {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 6px;
      color: var(--text-sub);
    }
    .input-icon-btn svg { width: 18px; height: 18px; fill: #aaa; display: block; }
    .validate-result {
      display: flex; align-items: center; gap: 6px; padding: 10px;
      border-radius: 8px; font-size: 12px; margin-bottom: 10px;
    }
    .validate-result.success { background: rgba(76,175,80,0.1); color: #66BB6A; border: 1px solid rgba(76,175,80,0.3); }
    .validate-result svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
    .add-btn {
      width: 100%; padding: 14px; background: var(--f1red); color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: inherit; transition: opacity 0.2s;
    }
    .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .add-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* Toast */
    .toast {
      position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--f1red); color: #fff; padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s;
      white-space: nowrap; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .scroll-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, var(--dark-bg)); pointer-events: none; }
    .bottom-safe { height: 20px; flex-shrink: 0; background: var(--dark-bg); }
  </style>
</head>
<body>
<div class="phone-frame">
  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.5C5.5 2.5 3.3 3.5 1.7 5.1L0 3.4C2.1 1.3 5 0 8 0s5.9 1.3 8 3.4l-1.7 1.7C12.7 3.5 10.5 2.5 8 2.5zm0 3.5c-1.4 0-2.7.5-3.7 1.4L2.6 5.7C4 4.3 5.9 3.5 8 3.5s4 .8 5.4 2.2l-1.7 1.7C10.7 6.5 9.4 6 8 6zm0 3c-.8 0-1.5.3-2 .8L8 12l2-.8c-.5-.5-1.2-.7-2-.7z"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="white" stroke-width="1" fill="none"/><rect x="22.5" y="3.5" width="2" height="5" rx="1" fill="white" opacity=".4"/><rect x="1.5" y="2.5" width="16" height="7" rx="1.5" fill="white"/></svg>
    </div>
  </div>

  <!-- App bar -->
  <div class="app-bar">
    <div class="app-bar-title">
      <div class="title-accent"></div>
      <span class="title-text">F1 ニュース</span>
      <div class="title-actions">
        <button class="icon-btn" onclick="openSourceManager()" id="manage-btn" title="ソース管理">
          <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
          <span class="badge-dot" id="badge-dot" style="display:none"></span>
        </button>
        <button class="icon-btn" onclick="refreshAnim(this)" title="更新">
          <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab active" id="tab-news" onclick="switchTab('news')">
        <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
        各社記事
      </div>
      <div class="tab" id="tab-ai" onclick="switchTab('ai')">
        <svg viewBox="0 0 24 24"><path d="M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z"/></svg>
        AIまとめ
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- News list tab -->
    <div class="tab-content active" id="content-news">
      <div class="filter-bar" id="filter-bar">
        <div class="chip active" onclick="filterSource(this,'all')">すべて</div>
        <div class="chip" onclick="filterSource(this,'f1gate')">F1-Gate.com</div>
        <div class="chip" onclick="filterSource(this,'asweb')">Auto Sport Web</div>
        <div class="chip" onclick="filterSource(this,'motorsport')">Motorsport.com</div>
        <div class="chip" onclick="filterSource(this,'formula1')">Formula 1 公式</div>
      </div>
      <div class="ad-banner"><span class="ad-label">広告</span><span>バナー広告スペース (320×50)</span></div>
      <div id="article-list"></div>
    </div>

    <!-- AI tab -->
    <div class="tab-content" id="content-ai">
      <div class="ai-header">
        <div class="ai-badge">★ Powered by Claude AI</div>
        <div class="ai-title-main">本日のF1ニュースまとめ</div>
        <div class="ai-subtitle">各社の記事をAIが分析・統合しました</div>
      </div>
      <div class="ad-banner"><span class="ad-label">広告</span><span>バナー広告スペース (320×50)</span></div>
      <div id="summary-list"></div>
      <div style="height:20px"></div>
    </div>

    <!-- Source Manager Screen -->
    <div class="screen-overlay" id="source-manager">
      <div class="screen-appbar">
        <button class="back-btn" onclick="closeSourceManager()">
          <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <span class="screen-title">ニュースソース管理</span>
      </div>
      <div class="screen-body">

        <!-- Default sources -->
        <div class="section-header">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
          デフォルトソース
        </div>
        <div id="default-source-list"></div>

        <div style="height:20px"></div>

        <!-- Custom sources -->
        <div class="section-header">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
          カスタムソース
        </div>
        <div id="custom-source-list"></div>

        <!-- Add form -->
        <div class="form-section">
          <div style="height:1px;background:var(--border);margin-bottom:20px"></div>
          <div class="form-label">RSSフィードを追加</div>
          <div class="form-hint">RSSフィードのURLを入力して確認してください</div>

          <div class="input-wrap">
            <input class="text-input" id="rss-url-input" type="url" placeholder="https://example.com/feed" />
            <button class="input-icon-btn" onclick="validateRss()">
              <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
          </div>

          <div id="validate-result" style="display:none" class="validate-result success">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            <span id="validate-text"></span>
          </div>

          <div class="input-wrap">
            <input class="text-input" id="rss-name-input" type="text" placeholder="サイト名（例: F1速報）" />
          </div>

          <button class="add-btn" id="add-btn" onclick="addCustomSource()" disabled>
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            ソースを追加
          </button>
        </div>
      </div>
    </div>

    <div class="scroll-fade"></div>
  </div>

  <div class="bottom-safe"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
// --- State ---
const defaultSources = [
  { id: 'f1gate', name: 'F1-Gate.com' },
  { id: 'asweb', name: 'Auto Sport Web' },
  { id: 'motorsport', name: 'Motorsport.com' },
  { id: 'formula1', name: 'Formula 1 公式' },
];
let customSources = []; // ユーザーが追加したカスタムソース
let validated = false;

// --- Article mock data ---
const defaultArticles = [
  { source: 'f1gate', sourceName: 'F1-Gate.com', title: 'フェルスタッペン、モナコGP制覇へ「予選が全てを決める」', time: '5/14 08:30', emoji: '🏎️' },

  { source: 'motorsport', sourceName: 'Motorsport.com', title: 'レッドブル、高ダウンフォースパッケージを投入か', time: '5/14 07:55', emoji: '⚙️' },
  { source: 'formula1', sourceName: 'Formula 1 公式', title: 'モナコGP週末のフルスケジュール', time: '5/14 07:30', emoji: '🗓️' },

  { source: 'asweb', sourceName: 'Auto Sport Web', title: 'ハミルトン「フェラーリで夢のシーズンにしたい」', time: '5/14 06:50', emoji: '🔴' },
  { source: 'motorsport', sourceName: 'Motorsport.com', title: 'アロンソ「モナコは違う結果を出す」', time: '5/14 06:30', emoji: '💚' },
  { source: 'formula1', sourceName: 'Formula 1 公式', title: 'ピレリがモナコにC3〜C5を選択', time: '5/14 06:00', emoji: '🔵' },
  { source: 'f1gate', sourceName: 'F1-Gate.com', title: 'ピアストリ「モナコはセットアップの妥協点が鍵」', time: '5/14 05:45', emoji: '🟠' },
  { source: 'asweb', sourceName: 'Auto Sport Web', title: 'FIA、バーレーンGPを受けて接触規定を改定へ', time: '5/14 05:20', emoji: '📋' },
];

const summaries = [
  { topic: 'レース展望', title: 'モナコGP決戦前夜：各チームの戦略と見どころ', content: '今週末のモナコGPを前に、各チームが最終準備を進めている。現在ランキングトップのフェルスタッペン（レッドブル）は「モナコでのオーバーテイクは事実上不可能。予選が全てを決める」と述べた。地元ドライバーのルクレール（フェラーリ）は「ここでのポールポジションは世界中のどの場所とも違う特別な意味がある」と語り、モチベーションの高さを示した。レッドブルは特別な高ダウンフォースパッケージを投入する噂もあり、セットアップ合戦にも注目が集まる。', time: '生成: 5/14 09:00' },
  { topic: 'チーム動向', title: 'メルセデス・フェラーリの巻き返しなるか', content: 'メルセデスはマクラーレンに再びパフォーマンスで上回られたと分析しており、モナコでの挽回を狙う。フェラーリに移籍したハミルトンは「今シーズンを夢のシーズンにしたい」と意欲を示し、アロンソのアストンマーティンも「市街地コースでは違う結果が出る」と自信を見せる。各チームのアップデートがモナコの特殊なレイアウトでどう機能するかが焦点だ。', time: '生成: 5/14 09:00' },
  { topic: 'タイヤ戦略', title: 'ピレリがソフト系選択、一発勝負の展開に', content: 'ピレリはモナコGPにC3・C4・C5の最もソフトな3種類のコンパウンドを選択した。モナコはオーバーテイクが極めて困難なためタイヤ交換タイミングが数少ない順位変動のチャンスとなる。昨年同様にアンダーカットが有効に機能するかが注目点で、ピットウォール上のストラテジストたちの判断が結果を大きく左右する。', time: '生成: 5/14 09:00' },
  { topic: 'レギュレーション', title: 'FIA、接触規定を改定へ', content: 'FIAはバーレーンGPで発生した複数の接触インシデントを受け、ドライバー同士の接触に関するレギュレーションの明確化を進めると発表した。ドライバー代表からも「判断基準が曖昧」との声が上がっており、今回の改定はドライバーコミュニティから概ね歓迎されている。', time: '生成: 5/14 09:00' },

// --- Render ---
function renderArticles(filter) {
  const list = document.getElementById('article-list');
  const allArticles = [
    ...defaultArticles,
    ...customSources.map((cs, i) => ({
      source: 'custom_' + i,
      sourceName: cs.name,
      isCustom: true,
      title: `【${cs.name}】最新F1ニュース記事のサンプルタイトルです`,
      time: '5/14 08:00',
      emoji: '📰',
    })),
  ];
  const filtered = filter === 'all' ? allArticles : allArticles.filter(a => a.source === filter || a.source === 'custom_' + customSources.findIndex(cs => 'custom_'+customSources.indexOf(cs) === filter));

  let html = '';
  filtered.forEach((a, i) => {
    if (i === 4) {
      html += `<div class="ad-banner ad-banner-medium"><span class="ad-label">広告</span><span>レクタングル広告 (300×100)</span></div>`;
    }
    html += `<div class="article-card" onclick="alert('外部ブラウザで開きます\\n\\n「${a.title}」')">
      <div class="article-card-inner">
        <div class="article-thumb">${a.emoji}</div>
        <div class="article-info">
          <div class="source-badge ${a.isCustom ? 'custom-badge' : ''}">${a.sourceName}</div>
          <div class="article-title">${a.title}</div>
          <div class="article-meta">⏰ ${a.time} &nbsp; <span style="margin-left:auto">↗</span></div>
        </div>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

function renderSummaries() {
  const list = document.getElementById('summary-list');
  let html = '';
  summaries.forEach((s, i) => {
    html += `<div class="summary-card">
      <div class="topic-badge">✨ ${s.topic}</div>
      <div class="summary-title">${s.title}</div>
      <div class="summary-body collapsed" id="body-${i}">${s.content}</div>
      <button class="expand-btn" id="btn-${i}" onclick="toggleExpand(${i})">続きを読む ▾</button>
      <hr class="summary-divider">
      <div class="summary-footer">✨ AI生成 ${s.time}</div>
    </div>`;
  });
  list.innerHTML = html;
}

function renderDefaultSources() {
  const list = document.getElementById('default-source-list');
  list.innerHTML = defaultSources.map(s => `
    <div class="source-tile">
      <svg viewBox="0 0 24 24"><path d="M6.18 15.64a2.18 2.18 0 012.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 012.18-2.18M4 4.44A15.56 15.56 0 0119.56 20h-2.83A12.73 12.73 0 004 7.27V4.44m0 5.66a9.9 9.9 0 019.9 9.9h-2.83A7.07 7.07 0 004 12.93V10.1z"/></svg>
      <div style="flex:1"><div class="source-tile-name">${s.name}</div></div>
      <span class="default-chip">デフォルト</span>
    </div>`).join('');
}

function renderCustomSources() {
  const list = document.getElementById('custom-source-list');
  if (customSources.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px 0 4px">追加したカスタムソースはありません</div>';
    return;
  }
  list.innerHTML = customSources.map((s, i) => `
    <div class="source-tile custom-tile">
      <svg viewBox="0 0 24 24"><path d="M6.18 15.64a2.18 2.18 0 012.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 012.18-2.18M4 4.44A15.56 15.56 0 0119.56 20h-2.83A12.73 12.73 0 004 7.27V4.44m0 5.66a9.9 9.9 0 019.9 9.9h-2.83A7.07 7.07 0 004 12.93V10.1z"/></svg>
      <div style="flex:1;min-width:0">
        <div class="source-tile-name">${s.name}</div>
        <div class="source-tile-url">${s.url}</div>
      </div>
      <button class="delete-btn" onclick="removeSource(${i})">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>`).join('');
}

function updateFilterBar() {
  const bar = document.getElementById('filter-bar');
  // カスタムソースのチップだけ再構築
  const existing = bar.querySelectorAll('.custom-chip');
  existing.forEach(e => e.remove());
  customSources.forEach((cs, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip custom-chip';
    chip.textContent = cs.name;
    chip.onclick = () => filterSource(chip, 'custom_' + i);
    bar.appendChild(chip);
  });
}

// --- Interactions ---
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('content-' + tab).classList.add('active');
}

function filterSource(el, source) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderArticles(source);
}

function toggleExpand(i) {
  const body = document.getElementById('body-' + i);
  const btn = document.getElementById('btn-' + i);
  body.classList.toggle('collapsed');
  btn.textContent = body.classList.contains('collapsed') ? '続きを読む ▾' : '閉じる ▴';
}

function refreshAnim(btn) {
  const svg = btn.querySelector('svg');
  svg.style.transition = 'transform 0.5s';
  svg.style.transform = 'rotate(360deg)';
  setTimeout(() => { svg.style.transform = ''; }, 600);
}

// --- Source Manager ---
function openSourceManager() {
  document.getElementById('source-manager').classList.add('open');
  renderDefaultSources();
  renderCustomSources();
}

function closeSourceManager() {
  document.getElementById('source-manager').classList.remove('open');
  renderArticles('all');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.chip').classList.add('active');
  updateFilterBar();
}

function validateRss() {
  const url = document.getElementById('rss-url-input').value.trim();
  if (!url) return;

  // デモ用: URLが入力されていれば成功とみなす
  const fakeNames = {
    'f1sokuho': 'F1速報', 'racingline': 'RacingLine', 'default': 'カスタムサイト'
  };
  const key = Object.keys(fakeNames).find(k => url.includes(k)) || 'default';
  const detectedName = fakeNames[key];

  const result = document.getElementById('validate-result');
  const text = document.getElementById('validate-text');
  result.style.display = 'flex';
  text.textContent = `RSS確認済み: ${detectedName}`;

  document.getElementById('rss-name-input').value = detectedName;
  document.getElementById('add-btn').disabled = false;
  validated = true;
}

function addCustomSource() {
  const url = document.getElementById('rss-url-input').value.trim();
  const name = document.getElementById('rss-name-input').value.trim();
  if (!url || !name || !validated) return;

  customSources.push({ url, name });

  // Reset form
  document.getElementById('rss-url-input').value = '';
  document.getElementById('rss-name-input').value = '';
  document.getElementById('validate-result').style.display = 'none';
  document.getElementById('add-btn').disabled = true;
  validated = false;

  // Update badge
  document.getElementById('badge-dot').style.display = customSources.length > 0 ? 'block' : 'none';

  renderCustomSources();
  showToast(`「${name}」を追加しました`);
}

function removeSource(i) {
  const name = customSources[i].name;
  customSources.splice(i, 1);
  document.getElementById('badge-dot').style.display = customSources.length > 0 ? 'block' : 'none';
  renderCustomSources();
  showToast(`「${name}」を削除しました`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// --- Init ---
renderArticles('all');
renderSummaries();
</script>
</body>
</html>
